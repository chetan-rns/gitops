apiVersion: triggers.tekton.dev/v1alpha1
kind: EventListener
metadata:
  creationTimestamp: null
  name: cicd-event-listener
  namespace: cicd
spec:
  namespaceSelector: {}
  podTemplate: {}
  resources: {}
  serviceAccountName: pipeline
  triggers:
  - bindings:
    - ref: github-push-binding
    interceptors:
    - ref:
        name: "github"
        kind: ClusterInterceptor
        apiVersion: triggers.tekton.dev
      params:
      - name: "secretRef"
        value:
          secretName: gitops-webhook-secret
          secretKey: webhook-secret-key
    - ref:
        name: "cel"
      params:
      - name: "filter"
        value: (header.match('X-GitHub-Event', 'push') && body.repository.full_name == 'chetan-rns/gitops')
      - name: "overlays"
        value:
        - key: ref
          expression: body.ref.split('/')[2]
    name: ci-dryrun-from-push
    template:
      ref: ci-dryrun-from-push-template
  - bindings:
    - ref: dev-app-taxi-taxi-binding
    - ref: github-push-binding
    interceptors:
    - ref:
        name: "github"
        kind: ClusterInterceptor
        apiVersion: triggers.tekton.dev
      params:
      - name: "secretRef"
        value:
          secretName: webhook-secret-dev-taxi
          secretKey: webhook-secret-key
    - ref:
        name: "cel"
      params:
      - name: "filter"
        value: (header.match('X-GitHub-Event', 'push') && body.repository.full_name == 'chetan-rns/taxi')
      - name: "overlays"
        value:
        - key: ref
          expression: body.ref.split('/')[2]
    name: app-ci-build-from-push-taxi
    template:
      ref: app-ci-template
status:
  configuration:
    generatedName: ""
